<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather App</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <main class="app">
      <form id="weather-form" class="search-bar" novalidate>
        <label for="city-input" class="sr-only">City name</label>
        <input
          id="city-input"
          name="city"
          type="text"
          placeholder="Search a city..."
          autocomplete="on"
          required
        />
        <button id="search-btn" type="submit">Go</button>
        <p id="form-message" class="form-message" aria-live="polite"></p>
      </form>

      <div class="split">
        <section class="primary" aria-live="polite">
          <h1 id="city-name" class="city">City Name</h1>
          <p id="weather-time" class="time">--:--</p>
          <p class="temp">
            <span id="temp-value" class="temp-number">--</span><span class="temp-unit">°F</span>
          </p>
          <p id="weather-description" class="condition">Condition</p>
          <p class="hi-lo">
            H: <span id="temp-high">--</span>°
            <span class="sep">/</span>
            L: <span id="temp-low">--</span>°
          </p>
        </section>

        <aside class="secondary">
          <div class="stat">
            <span class="stat-label">Feels Like</span>
            <span class="stat-value"><span id="feels-like">--</span>°F</span>
          </div>
          <div class="stat">
            <span class="stat-label">Humidity</span>
            <span class="stat-value"><span id="humidity">--</span>%</span>
          </div>
          <div class="stat">
            <span class="stat-label">Wind</span>
            <span class="stat-value"><span id="wind-speed">--</span> mph</span>
          </div>
          <div class="stat">
            <span class="stat-label">Pressure</span>
            <span class="stat-value"><span id="pressure">--</span> hPa</span>
          </div>

          <h2 class="forecast-heading">3-Day Forecast</h2>

          <div id="forecast-1" class="forecast-row">
            <span class="forecast-day">Day</span>
            <span class="forecast-hi">H: <span id="forecast-high-1">--</span>°</span>
            <span class="forecast-lo">L: <span id="forecast-low-1">--</span>°</span>
          </div>
          <div id="forecast-2" class="forecast-row">
            <span class="forecast-day">Day</span>
            <span class="forecast-hi">H: <span id="forecast-high-2">--</span>°</span>
            <span class="forecast-lo">L: <span id="forecast-low-2">--</span>°</span>
          </div>
          <div id="forecast-3" class="forecast-row">
            <span class="forecast-day">Day</span>
            <span class="forecast-hi">H: <span id="forecast-high-3">--</span>°</span>
            <span class="forecast-lo">L: <span id="forecast-low-3">--</span>°</span>
          </div>
        </aside>
      </div>
    </main>

    <script src="app.js"></script>
  </body>
</html>
