<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FizzBuzz Practice</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="page">
      <section class="card">
        <h1>FizzBuzz</h1>
        <section>
          <h2>Input</h2>
          <label for="number-input">Enter a number:</label>
          <input id="number-input" name="number-input" type="number" min="1" />
          <button id="run-btn" type="button">Run</button>
        </section>

        <section>
          <h2>Output</h2>
          <pre id="output" aria-live="polite"></pre>
          <div id="output-message"></div>
        </section>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
